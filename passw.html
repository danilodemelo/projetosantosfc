<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha</title>
   <link rel="stylesheet" href="passw.css">
   <link rel="shortcut icon" href="imagens/Santos_Logo.png" type="image/x-icon">
</head>

<div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
    <div class="vw-plugin-top-wrapper"></div>
  </div>
</div>
<script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
<script>
  new window.VLibras.Widget('https://vlibras.gov.br/app');
</script>

<body>

  <div class="container">

    <!-- LADO ESQUERDO -->
    <div class="left">
      <h1>Recuperar senha</h1>
      <p>Esqueceu sua senha? Não se preocupe. Informe seu e-mail e enviaremos um link para redefinição.</p>
    </div>

    <!-- LADO DIREITO -->
    <div class="right">
      <h2>Esqueci minha senha</h2>

      <form>
        <!-- CAMPO DE EMAIL -->
        <div class="form-group">
          <input type="email" placeholder="Digite seu e-mail">
        </div>

        <!-- BOTÃO -->
        <button class="btn">Enviar link de recuperação</button>
      </form>

      <!-- LINKS -->
      <div class="links">
        <a href="form.html">Voltar para login</a>
      </div>

    </div>

  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Santos FC</title>
    <link rel="stylesheet" href="form.css">
    <link rel="shortcut icon" href="imagens/Santos_Logo.png" type="image/x-icon">

</head>

<body>

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
          <div class="vw-plugin-top-wrapper"></div>
        </div>
      </div>
      <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
      <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
      </script>

    <main>

        <div class="container">
        
                <h2>Login</h2>

            <form action="">

                <div class="input-group">
                    <label for="">E-Mail:</label>
                    <input type="email" placeholder="Digite seu E-Mail" required>
                </div>

                <div class="input-group">
                    <label for="Senha">Senha:</label>
                    <input type="password" placeholder="Digite sua Senha" required>
                </div>

                <div class="links">
                    <a href="passw.html">Esqueci minha Senha</a>
                    <a href="cadastro.html">Não tenho Cadastro</a>
                </div>

                <input type="submit" class="btn" value="Entrar">

            </form>

            <button class="google-btn">
                <img src="imagens/google.png" alt="Icon Google">
                Entrar com Google
            </button>


        </div>

    </main>
</body>

</html>
